name: Infra Pipeline for Multi-Env 

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - dr
          - prod
      working_directory:
        description: "Terraform folder path"
        required: true
        default: "rg"

permissions:
  id-token: write
  contents: read

jobs:
  terraform_plan:
    name: "Plan - ${{ github.event.inputs.target_env }}"
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    env:    
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
      TF_IN_AUTOMATION: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ github.event.inputs.working_directory }}

      - name: Terraform Plan
        run: terraform plan -out="${{ github.workspace }}\tfplan"
        working-directory: ${{ github.event.inputs.working_directory }}

      - name: Upload Plan File
        uses: actions/upload-artifact@v4
        with:
          # Unique name for artifact per environment
          name: tf-plan-${{ github.event.inputs.target_env }}
          path: ${{ github.workspace }}\tfplan

  terraform_apply:
    name: "Apply - ${{ github.event.inputs.target_env }}"
    needs: terraform_plan
    runs-on: [self-hosted, Windows]
    environment: ${{ github.event.inputs.target_env }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Plan File
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-${{ github.event.inputs.target_env }}
          path: ${{ github.workspace }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ github.event.inputs.working_directory }}

      - name: Terraform Apply
        run: terraform apply -auto-approve "${{ github.workspace }}\tfplan"
        working-directory: ${{ github.event.inputs.working_directory }}

